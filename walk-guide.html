<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<script type="text/javascript"
			src="//api.map.baidu.com/api?type=webgl&v=1.0&ak=aGeliBgNx1PJmMlkheDDGoMO1hsITLRq"></script>
		<title>步行导航</title>
		<style type="text/css">
			body,
			html {
				width: 100%;
				height: 100%;
				padding: 0;
				margin: 0;
				font-family: "微软雅黑";
			}

			#l-map {
				height: 400px;
				width: 100%;
			}

			#r-result,
			#r-result table {
				width: 100%;

			}

			.box {
				position: absolute;
				/*绝对定位*/
				z-index: 999;
			}

			.box input {
				height: 40px;
				width: 300px;
				border-radius: 20px;/*圆角为20px*/
				text-align: center;
				background: rgba(255, 255, 255, 0.5);
			}
			button{
				width: 80px;
				height: 50px;
				border-radius: 20px;/*圆角为20px*/
				border: none;/*去掉边框*/
				font-size: 18px;/*字体大小*/
				background: #a1af3f;
			}
		</style>
	</head>
	<body>
		<div class="box">
			<input id="qd" placeholder="输入起点" />
			<input id="zd" placeholder="输入终点" />
			<button onclick="chaxun()">查询</button>
		</div>
		<div id="l-map"></div>
		<div id="r-result"></div>

	</body>
</html>
<script type="text/javascript">
	// 百度地图API功能
	var map = new BMapGL.Map("l-map");
	map.centerAndZoom(new BMapGL.Point(116.404, 39.915), 11);
	var walking = new BMapGL.WalkingRoute(map, {
		renderOptions: {
			map: map,
			panel: "r-result",
			autoViewport: true
		}
	});
	walking.search("西单", "慈云寺");

	function chaxun() {
		var qd = document.getElementById("qd");
		var zd = document.getElementById("zd");
		walking.search(qd.value, zd.value);
	}
</script>
