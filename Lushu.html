<!DOCTYPE html>
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
		<style type="text/css">
			body,
			html,
			#allmap {
				width: 100%;
				height: 100%;
				overflow: hidden;
				margin: 0;
				font-family: "微软雅黑";
			}
			input {
				height: 40px;
				width: 300px;
				border-radius: 10px;
				text-align: center;
				background: rgba(255, 255, 255, 0.5);
			}
			button{
				width: 100px;
				height: 50px;
				border-radius: 20px;/*圆角为20px*/
				border: none;/*去掉边框*/
				font-size: 18px;/*字体大小*/
				background: #a1af3f;
			}
		</style>
		<script type="text/javascript"
			src="//api.map.baidu.com/api?type=webgl&v=1.0&ak=4KtD5QibOGDiYYqTxXVVJJPOcpug4ePe"></script>
		<script type="text/javascript" src="//api.map.baidu.com/library/LuShu/gl/src/LuShu_min.js"></script>
		<title>大地线路书</title>
	</head>
	<body>
		<input id="zbd" placeholder="添加坐标点" />
		<button onclick="addPoint()">添加</button>
		<button onclick="startLushu()">开启路书</button>
		<div id="allmap"></div>
	</body>
</html>
<script type="text/javascript">
	// 百度地图API功能
	var map = new BMapGL.Map("allmap");
	var point = new BMapGL.Point(116.404, 39.925);
	map.centerAndZoom(point, 15);
	map.enableScrollWheelZoom();

	function startLushu() {
		var polyline = new BMapGL.Polyline(path, {
			clip: false,
			geodesic: true,
			strokeWeight: 3
		});
		map.addOverlay(polyline);
		var fly = new Image();
		fly.src = "img/卫星.png";
		lushu = new BMapGLLib.LuShu(map, polyline.getPath(), {
			geodesic: true,
			autoCenter: true,
			icon: new BMapGL.Icon(fly, new BMapGL.Size(48, 48), {
				anchor: new BMapGL.Size(24, 24)
			}),
			speed: 1000,
			enableRotation: true
		});
		setTimeout('lushu.start()', 4000);
	}
	//创建地址解析器实例
	var myGeo = new BMapGL.Geocoder();

	function addPoint() {
		var zbd = document.getElementById("zbd");
		myGeo.getPoint(zbd.value, function(point) {
			if (point) {
				path.push(point); /*给路径添加新的点*/
				alert("添加成功!");

			} else {
				alert('您选择的地址没有解析到结果！');
			}
		})
	}
	var path = [];
</script>
